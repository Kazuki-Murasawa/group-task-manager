<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Task Manager</title>
    <style>
        :root {
            --bg: #eef1f6;
            --surface: #ffffff;
            --surface-alt: #f4f6f9;
            --border: #e0e4ea;
            --text: #1f2733;
            --text-muted: #5b6472;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --primary-tint: #eaf1ff;
            --primary-text: #2563eb;
            --danger: #e0384c;
            --danger-tint: #fdeced;
            --danger-text: #bb2033;
            --warning-tint: #fdf3e0;
            --warning-text: #8f5e05;
            --success-tint: #e5f6ef;
            --success-text: #0f6e46;
            --row-hover: #f7f9fc;
            --shadow: 0 8px 30px rgba(15, 23, 42, .12);
            --radius-lg: 14px;
            --radius-md: 10px;
            --radius-sm: 7px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #14161c;
                --surface: #1d2027;
                --surface-alt: #262a33;
                --border: #343945;
                --text: #e7e9ee;
                --text-muted: #9aa1b0;
                --primary: #4f8cff;
                --primary-hover: #6ea0ff;
                --primary-tint: #223050;
                --primary-text: #84acff;
                --danger: #ff6b7a;
                --danger-tint: #3a2126;
                --danger-text: #ff6b7a;
                --warning-tint: #3a301c;
                --warning-text: #e3a13a;
                --success-tint: #1c3a2c;
                --success-text: #3ecf8e;
                --row-hover: #232732;
                --shadow: 0 8px 30px rgba(0, 0, 0, .45);
            }
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", "Noto Sans JP", sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
        }

        .hidden { display: none !important; }
        .text-muted { color: var(--text-muted); }
        ul { list-style: none; padding: 0; margin: 0; }

        /* --- トップバー --- */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }
        .topbar-inner {
            max-width: 1080px;
            margin: 0 auto;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .brand { display: flex; align-items: center; gap: 8px; margin-right: auto; }
        .brand-icon { font-size: 1.25rem; }
        .brand-title { color: var(--text); text-decoration: none; font-weight: 700; font-size: 1.1rem; white-space: nowrap; }
        .user-name { font-size: 0.85rem; color: var(--text-muted); max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .page { max-width: 1080px; margin: 0 auto; padding: 20px 20px 60px; }

        /* --- ボタン --- */
        .btn {
            cursor: pointer;
            border: 1px solid transparent;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 14px;
            padding: 9px 16px;
            font-family: inherit;
            white-space: nowrap;
            transition: background-color .15s ease, border-color .15s ease, color .15s ease;
        }
        .btn-sm { padding: 5px 10px; font-size: 12px; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-ghost { background: transparent; color: var(--text-muted); border-color: var(--border); }
        .btn-ghost:hover { background: var(--surface-alt); color: var(--text); }
        .btn-danger { background: var(--danger-tint); color: var(--danger-text); }
        .btn-danger:hover { filter: brightness(0.95); }

        /* --- フォーム部品 --- */
        input, textarea, select {
            background: var(--surface);
            color: var(--text);
            padding: 9px 12px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            font-size: 14px;
            font-family: inherit;
            width: 100%;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-tint);
        }
        textarea { min-height: 140px; resize: vertical; line-height: 1.5; }
        .field-label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--text-muted); margin: 12px 0 4px; }
        .field-label:first-child { margin-top: 0; }

        /* --- ログイン前ヒーロー --- */
        .login-hero {
            text-align: center;
            padding: 90px 16px;
        }
        .login-hero .hero-icon { font-size: 3rem; }
        .login-hero h1 { font-size: 1.5rem; margin: 14px 0 8px; }
        .login-hero p { color: var(--text-muted); margin: 0 0 26px; }

        /* --- KPI行（件数タイル） --- */
        .kpi-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 14px;
        }
        .kpi-tile {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 12px 14px;
            cursor: pointer;
            text-align: left;
            font-family: inherit;
            transition: border-color .15s ease, background-color .15s ease;
        }
        .kpi-tile:hover { border-color: var(--primary); }
        .kpi-tile.active { border-color: var(--primary); background: var(--primary-tint); }
        .kpi-tile .count { font-size: 1.5rem; font-weight: 700; line-height: 1.2; color: var(--text); }
        .kpi-tile .label { font-size: 0.76rem; color: var(--text-muted); }
        .kpi-tile.kpi-attention .count { color: var(--danger-text); }

        /* --- ツールバー（検索・フィルタ） --- */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
        }
        .toolbar .search-box { flex: 1 1 200px; min-width: 160px; }
        .toolbar select { width: auto; flex: 0 0 auto; }
        .chip-group { display: flex; gap: 6px; flex-wrap: wrap; }
        .chip {
            background: var(--surface);
            color: var(--text-muted);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 6px 14px;
            font-size: 0.8rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all .15s ease;
        }
        .chip:hover { border-color: var(--primary); color: var(--primary-text); }
        .chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        /* --- 表示切り替えトグル（リスト/ボード） --- */
        .view-toggle {
            display: flex;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
            flex: 0 0 auto;
            margin-left: auto;
        }
        .view-toggle-btn {
            background: var(--surface);
            color: var(--text-muted);
            border: none;
            padding: 8px 12px;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
        }
        .view-toggle-btn + .view-toggle-btn { border-left: 1px solid var(--border); }
        .view-toggle-btn:hover { background: var(--surface-alt); color: var(--text); }
        .view-toggle-btn.active { background: var(--primary); color: #fff; }

        /* --- バッジ --- */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            border-radius: 999px;
            padding: 2px 10px;
            font-size: 0.74rem;
            font-weight: 600;
            white-space: nowrap;
        }
        .badge-todo { background: var(--surface-alt); color: var(--text-muted); border: 1px solid var(--border); }
        .badge-in_progress { background: var(--warning-tint); color: var(--warning-text); }
        .badge-done { background: var(--success-tint); color: var(--success-text); }
        .badge-overdue { background: var(--danger-tint); color: var(--danger-text); }
        .badge-due-soon { background: var(--warning-tint); color: var(--warning-text); }
        .badge-due-normal { background: transparent; color: var(--text-muted); }
        .badge-category { background: var(--primary-tint); color: var(--primary-text); }

        /* --- タスクテーブル --- */
        .table-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }
        .task-table { width: 100%; border-collapse: collapse; }
        .task-table th {
            text-align: left;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .05em;
            color: var(--text-muted);
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            background: var(--surface-alt);
        }
        .task-table td {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        .task-table tbody tr { cursor: pointer; transition: background-color .1s ease; }
        .task-table tbody tr:hover { background: var(--row-hover); }
        .task-table tbody tr:last-child td { border-bottom: none; }
        .task-table tr.row-done .cell-title .task-name { color: var(--text-muted); text-decoration: line-through; }

        .cell-title .task-name { font-weight: 600; }
        .cell-title .badge-category { margin-left: 8px; vertical-align: middle; }
        .cell-title .task-desc {
            display: block;
            color: var(--text-muted);
            font-size: 0.78rem;
            margin-top: 2px;
            max-width: 420px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .cell-assignee { font-size: 0.85rem; }
        .cell-assignee.unassigned { color: var(--text-muted); }
        .cell-due { font-size: 0.85rem; white-space: nowrap; }

        /* 行内ステータス変更セレクト（バッジ風の見た目） */
        .status-select {
            width: auto;
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 600;
            padding: 4px 26px 4px 12px;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='10' height='6'%3E%3Cpath d='M1 1l4 4 4-4' fill='none' stroke='%23888' stroke-width='1.5'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 10px center;
        }
        .status-select.badge-todo { border-color: var(--border); }
        .status-select.badge-in_progress { border-color: transparent; }
        .status-select.badge-done { border-color: transparent; }
        .status-select option { background: var(--surface); color: var(--text); }

        .empty-state { text-align: center; padding: 70px 16px; color: var(--text-muted); }
        .empty-state .hero-icon { font-size: 2.4rem; display: block; margin-bottom: 10px; }

        /* --- カンバンボード --- */
        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; align-items: start; }
        .board-column {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .board-column-header {
            padding: 12px 14px;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            background: var(--surface-alt);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .board-count {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 999px;
            font-size: 0.72rem;
            padding: 1px 8px;
        }
        .board-column-body {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 60px;
            transition: background-color .15s ease;
        }
        .board-column-body.drag-over { background: var(--primary-tint); }
        .board-empty { text-align: center; color: var(--text-muted); font-size: 0.8rem; padding: 16px 0; }
        .board-card {
            background: var(--surface-alt);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 10px 12px;
            cursor: grab;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .board-card:hover { border-color: var(--primary); }
        .board-card.dragging { opacity: 0.5; }
        .board-card-title { font-weight: 600; font-size: 0.9rem; overflow-wrap: anywhere; }
        .board-card-badges { display: flex; flex-wrap: wrap; gap: 4px; }
        .board-card-meta { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
        .board-card-select { width: auto; align-self: flex-start; }

        /* --- モーダル（詳細・編集・新規） --- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 40;
            background: rgba(15, 23, 42, .5);
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 6vh 16px 16px;
            overflow-y: auto;
        }
        .modal-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 620px;
            padding: 24px 26px;
        }
        .modal-header { display: flex; align-items: flex-start; gap: 12px; }
        .modal-header h2 { margin: 0; font-size: 1.25rem; line-height: 1.4; flex: 1; overflow-wrap: anywhere; }
        .modal-close {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.3rem;
            line-height: 1;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: var(--radius-sm);
        }
        .modal-close:hover { background: var(--surface-alt); color: var(--text); }
        .task-badges { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0 16px; }
        .task-description { line-height: 1.7; white-space: pre-wrap; overflow-wrap: anywhere; }
        .task-meta {
            margin-top: 20px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .task-actions { display: flex; gap: 8px; margin-top: 18px; flex-wrap: wrap; justify-content: flex-end; }
        .form-row { display: flex; gap: 14px; }
        .form-row > div { flex: 1; }
        .form-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }

        /* --- 登録リスト管理モーダル（カテゴリ・担当者で共通） --- */
        .manage-list { display: flex; flex-direction: column; gap: 6px; margin: 10px 0 16px; max-height: 40vh; overflow-y: auto; }
        .manage-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 8px 12px;
            background: var(--surface-alt);
            border-radius: var(--radius-sm);
        }
        .manage-add { display: flex; gap: 8px; }
        .manage-add input { flex: 1; }

        /* --- モバイル：テーブル→カード --- */
        @media (max-width: 720px) {
            .kpi-row { grid-template-columns: repeat(2, 1fr); }
            .task-table thead { display: none; }
            .task-table, .task-table tbody, .task-table tr, .task-table td { display: block; width: 100%; }
            .task-table tbody tr { padding: 12px 14px; border-bottom: 1px solid var(--border); }
            .task-table tbody tr:last-child { border-bottom: none; }
            .task-table td { padding: 3px 0; border-bottom: none; }
            .cell-title .task-desc { max-width: none; }
            .cell-status, .cell-assignee, .cell-due { display: inline-block !important; width: auto !important; margin-right: 10px; }
            .form-row { flex-direction: column; gap: 0; }
            .user-name { display: none; }
            .board { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header class="topbar">
    <div class="topbar-inner">
        <div class="brand">
            <span class="brand-icon" aria-hidden="true">✅</span>
            <a href="#/" class="brand-title">Group Task Manager</a>
        </div>
        <button id="new-task-btn" class="btn btn-primary hidden">＋ 新規タスク</button>
        <div id="user-info" class="hidden" style="display:flex;align-items:center;gap:10px;">
            <span id="user-name" class="user-name"></span>
            <button id="logout-btn" class="btn btn-ghost btn-sm">ログアウト</button>
        </div>
    </div>
</header>

<div class="page">
    <div id="login-hero" class="login-hero">
        <span class="hero-icon" aria-hidden="true">✅</span>
        <h1>Group Task Manager</h1>
        <p>グループのタスクをみんなで管理。担当者と期限を決めて、進み具合をひと目で。</p>
        <button id="login-btn" class="btn btn-primary">Googleでログイン</button>
    </div>

    <div id="app-content" class="hidden">
        <div id="kpi-row" class="kpi-row"></div>

        <div class="toolbar">
            <div class="search-box"><input type="text" id="search-input" placeholder="タスクを検索"></div>
            <div id="status-chips" class="chip-group"></div>
            <select id="assignee-filter" title="担当者で絞り込み"></select>
            <button id="manage-assignees-btn" class="btn btn-ghost btn-sm">担当者管理</button>
            <select id="category-filter" title="カテゴリで絞り込み"></select>
            <button id="manage-categories-btn" class="btn btn-ghost btn-sm">カテゴリ管理</button>
            <div class="view-toggle" id="view-toggle">
                <button class="view-toggle-btn" data-view="list">☰ リスト</button>
                <button class="view-toggle-btn" data-view="board">▦ ボード</button>
            </div>
        </div>

        <div class="table-card" id="table-card">
            <table class="task-table">
                <thead>
                    <tr>
                        <th>タスク</th>
                        <th style="width:130px;">ステータス</th>
                        <th style="width:140px;">担当者</th>
                        <th style="width:150px;">期限</th>
                    </tr>
                </thead>
                <tbody id="task-tbody"></tbody>
            </table>
        </div>

        <div class="board hidden" id="board-view">
            <div class="board-column">
                <div class="board-column-header">未着手 <span class="board-count" data-status="todo">0</span></div>
                <div class="board-column-body" data-status="todo"></div>
            </div>
            <div class="board-column">
                <div class="board-column-header">進行中 <span class="board-count" data-status="in_progress">0</span></div>
                <div class="board-column-body" data-status="in_progress"></div>
            </div>
            <div class="board-column">
                <div class="board-column-header">完了 <span class="board-count" data-status="done">0</span></div>
                <div class="board-column-body" data-status="done"></div>
            </div>
        </div>

        <div id="empty-state" class="empty-state hidden"></div>
    </div>
</div>

<div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div id="modal-card" class="modal-card"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, onSnapshot, deleteDoc, updateDoc, doc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Wikiプロジェクト（Kazuki-Murasawa.github.io）と同じFirebaseプロジェクトを共用する。
    // コレクションは tasks / categories / assignees を新設し、既存の wiki_* とは分離している。
    const firebaseConfig = {
        apiKey: "AIzaSyB6LzMo95UjoFkGncbRqU7Kis4fGCmK3Pw",
        authDomain: "my-sync-todo.firebaseapp.com",
        projectId: "my-sync-todo",
        storageBucket: "my-sync-todo.firebasestorage.app",
        messagingSenderId: "536879813996",
        appId: "1:536879813996:web:ded67500cd6bdb80804f49"
    };

    const STATUS_LABELS = { todo: '未着手', in_progress: '進行中', done: '完了' };
    const DUE_SOON_MS = 2 * 24 * 60 * 60 * 1000; // 2日以内を「期限間近」とする

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;
    let unsubscribeTasks = null;
    let unsubscribeCategories = null;
    let unsubscribeAssignees = null;
    let currentTasks = [];
    let currentCategories = []; // { id, name } の配列。事前登録制（categoriesコレクション）
    let currentAssignees = [];  // { id, name } の配列。事前登録制（assigneesコレクション）

    // --- 画面状態 ---
    let selectedTaskId = null;      // '#/task/<id>' で詳細モーダルを開く
    let isCreating = false;         // '#/new' で新規作成モーダルを開く
    let isManagingCategories = false; // '#/categories' でカテゴリ管理モーダルを開く
    let isManagingAssignees = false;  // '#/assignees' で担当者管理モーダルを開く
    let isEditingSelected = false;
    let searchQuery = '';
    let statusFilter = null;        // null | 'todo' | 'in_progress' | 'done' | 'attention'
    let assigneeFilter = '';        // '' = 全員 | 'none' = 未アサイン | 担当者名
    let categoryFilter = '';        // '' = すべて | 'none' = 未分類 | カテゴリ文字列
    let viewMode = localStorage.getItem('gtm_view_mode') === 'board' ? 'board' : 'list'; // 'list' | 'board'

    // --- ハッシュルーティング（#/task/<id> / #/new / #/categories / #/assignees） ---
    function parseHash() {
        const hash = location.hash;
        selectedTaskId = null;
        isCreating = false;
        isManagingCategories = false;
        isManagingAssignees = false;

        if (hash.startsWith('#/task/')) {
            selectedTaskId = decodeURIComponent(hash.slice('#/task/'.length));
        } else if (hash === '#/new') {
            isCreating = true;
        } else if (hash === '#/categories') {
            isManagingCategories = true;
        } else if (hash === '#/assignees') {
            isManagingAssignees = true;
        }
        isEditingSelected = false;
    }

    window.addEventListener('hashchange', () => {
        parseHash();
        renderAll();
    });
    parseHash();

    // --- ログイン・ログアウト・トップバー操作 ---
    document.getElementById('login-btn').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('logout-btn').onclick = () => signOut(auth);
    document.getElementById('new-task-btn').onclick = () => { location.hash = '#/new'; };
    document.getElementById('search-input').oninput = (e) => {
        searchQuery = e.target.value;
        renderView();
    };
    document.getElementById('assignee-filter').onchange = (e) => {
        assigneeFilter = e.target.value;
        renderView();
    };
    document.getElementById('category-filter').onchange = (e) => {
        categoryFilter = e.target.value;
        renderView();
    };
    document.getElementById('manage-categories-btn').onclick = () => { location.hash = '#/categories'; };
    document.getElementById('manage-assignees-btn').onclick = () => { location.hash = '#/assignees'; };
    document.getElementById('view-toggle').addEventListener('click', (e) => {
        const btn = e.target.closest('.view-toggle-btn');
        if (!btn) return;
        setViewMode(btn.dataset.view);
    });

    // モーダル：オーバーレイクリック・Escで閉じる
    document.getElementById('modal-overlay').addEventListener('click', (e) => {
        if (e.target === e.currentTarget) closeModal();
    });
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && (selectedTaskId || isCreating || isManagingCategories || isManagingAssignees)) closeModal();
    });
    window.closeModal = () => {
        if (location.hash) location.hash = '';
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            showApp(user);
            fetchTasks();
            fetchCategories();
            fetchAssignees();
        } else {
            currentUser = null;
            hideApp();
        }
    });

    function showApp(user) {
        document.getElementById('login-hero').classList.add('hidden');
        document.getElementById('user-info').classList.remove('hidden');
        document.getElementById('user-name').innerText = user.displayName;
        document.getElementById('new-task-btn').classList.remove('hidden');
        document.getElementById('app-content').classList.remove('hidden');
    }

    function hideApp() {
        document.getElementById('login-hero').classList.remove('hidden');
        document.getElementById('user-info').classList.add('hidden');
        document.getElementById('new-task-btn').classList.add('hidden');
        document.getElementById('app-content').classList.add('hidden');
        currentTasks = [];
        currentCategories = [];
        currentAssignees = [];
        searchQuery = '';
        statusFilter = null;
        assigneeFilter = '';
        categoryFilter = '';
        document.getElementById('search-input').value = '';
        document.getElementById('task-tbody').innerHTML = '';
        document.getElementById('modal-overlay').classList.add('hidden');
        if (location.hash) location.hash = '';
        if (unsubscribeTasks) unsubscribeTasks();
        if (unsubscribeCategories) unsubscribeCategories();
        if (unsubscribeAssignees) unsubscribeAssignees();
    }

    // --- カテゴリ・担当者（どちらも事前登録制。グループで共有する名前リストとして同じ形で扱う） ---

    function watchNamedList(collectionName, onUpdate) {
        const q = query(collection(db, collectionName), orderBy("name"));
        return onSnapshot(q, (snapshot) => {
            onUpdate(snapshot.docs.map((doc) => ({ id: doc.id, ...doc.data() })));
        });
    }

    async function addNamedItem(collectionName, inputId, existingItems, errorLabel) {
        if (!currentUser) return;
        const input = document.getElementById(inputId);
        const name = input.value.trim();
        if (!name || existingItems.some((item) => item.name === name)) {
            input.value = '';
            return;
        }
        try {
            await addDoc(collection(db, collectionName), { name, creatorUid: currentUser.uid, createdAt: new Date() });
            input.value = '';
        } catch (error) {
            alert(`${errorLabel}の追加に失敗しました: ` + error.message);
        }
    }

    async function deleteNamedItem(collectionName, id, errorLabel) {
        if (!currentUser) return;
        if (!confirm(`この${errorLabel}を削除しますか？（すでに設定済みのタスクの表示は残ります）`)) return;
        try {
            await deleteDoc(doc(db, collectionName, id));
        } catch (error) {
            alert(`${errorLabel}の削除に失敗しました: ` + error.message);
        }
    }

    function fetchCategories() {
        unsubscribeCategories = watchNamedList("categories", (items) => {
            currentCategories = items;
            renderCategoryFilter();
            renderModal();
        });
    }

    window.addCategory = () => addNamedItem("categories", 'new-category-input', currentCategories, 'カテゴリ');
    window.deleteCategory = (id) => deleteNamedItem("categories", id, 'カテゴリ');

    function fetchAssignees() {
        unsubscribeAssignees = watchNamedList("assignees", (items) => {
            currentAssignees = items;
            renderAssigneeFilter();
            renderModal();
        });
    }

    window.addAssignee = () => addNamedItem("assignees", 'new-assignee-input', currentAssignees, '担当者');
    window.deleteAssignee = (id) => deleteNamedItem("assignees", id, '担当者');

    // --- タスクの購読 ---

    function fetchTasks() {
        const q = query(collection(db, "tasks"), orderBy("createdAt", "desc"));
        unsubscribeTasks = onSnapshot(q, (snapshot) => {
            currentTasks = snapshot.docs.map((doc) => ({ id: doc.id, data: doc.data() }));
            renderAll();
        });
    }

    // --- 期限判定 ---

    function fmtDate(date) {
        const now = new Date();
        return date.getFullYear() === now.getFullYear()
            ? `${date.getMonth() + 1}/${date.getDate()}`
            : date.toLocaleDateString();
    }

    function dueInfo(data) {
        if (data.status === 'done') return { kind: 'done', label: '✓ 完了', className: 'badge-done' };
        if (!data.dueDate) return { kind: 'none', label: '—', className: 'badge-due-normal' };
        const due = data.dueDate.toDate();
        const label = fmtDate(due);
        // dueDateは期限日の0時で保存されるため、「超過」は期限日が丸ごと過ぎてから
        const endOfDueDay = new Date(due.getFullYear(), due.getMonth(), due.getDate() + 1);
        if (Date.now() >= endOfDueDay.getTime()) return { kind: 'overdue', label: `🔴 ${label} 超過`, className: 'badge-overdue' };
        if (due.getTime() - Date.now() <= DUE_SOON_MS) return { kind: 'soon', label: `🟡 ${label} 間近`, className: 'badge-due-soon' };
        return { kind: 'normal', label, className: 'badge-due-normal' };
    }

    function isAttention(task) {
        const kind = dueInfo(task.data).kind;
        return kind === 'overdue' || kind === 'soon';
    }

    // --- 一括再描画 ---

    function renderAll() {
        renderKpiRow();
        renderStatusChips();
        renderAssigneeFilter();
        renderCategoryFilter();
        renderViewToggle();
        renderView();
        renderModal();
    }

    // --- 表示切り替え（リスト⇔ボード） ---

    function setViewMode(mode) {
        if (viewMode === mode) return;
        viewMode = mode;
        localStorage.setItem('gtm_view_mode', mode);
        renderViewToggle();
        renderView();
    }

    function renderViewToggle() {
        document.querySelectorAll('.view-toggle-btn').forEach((btn) => {
            btn.classList.toggle('active', btn.dataset.view === viewMode);
        });
        // ボード表示は列自体がステータスを表すため、重複するステータスチップ絞り込みは隠す
        document.getElementById('status-chips').classList.toggle('hidden', viewMode === 'board');
    }

    function renderView() {
        const tasks = visibleTasks();
        const emptyElement = document.getElementById('empty-state');
        const isListView = viewMode === 'list';
        document.getElementById('table-card').classList.toggle('hidden', !isListView || tasks.length === 0);
        document.getElementById('board-view').classList.toggle('hidden', isListView || tasks.length === 0);

        if (tasks.length === 0) {
            const hasAny = currentTasks.length > 0;
            emptyElement.innerHTML = hasAny
                ? '<span class="hero-icon" aria-hidden="true">🔍</span>該当するタスクがありません。絞り込みを解除してみてください。'
                : '<span class="hero-icon" aria-hidden="true">🎉</span>まだタスクがありません。「＋ 新規タスク」から最初のタスクを作りましょう。';
            emptyElement.classList.remove('hidden');
            return;
        }
        emptyElement.classList.add('hidden');

        if (isListView) renderTable(tasks); else renderBoard(tasks);
    }

    // --- KPI行（クリックで絞り込み） ---

    function renderKpiRow() {
        const counts = { todo: 0, in_progress: 0, done: 0 };
        let attention = 0;
        currentTasks.forEach((t) => {
            counts[t.data.status] = (counts[t.data.status] || 0) + 1;
            if (isAttention(t)) attention++;
        });

        const tiles = [
            { key: 'todo', label: '未着手', count: counts.todo || 0, cls: '' },
            { key: 'in_progress', label: '進行中', count: counts.in_progress || 0, cls: '' },
            { key: 'done', label: '完了', count: counts.done || 0, cls: '' },
            { key: 'attention', label: '⚠ 要注意（期限間近・超過）', count: attention, cls: ' kpi-attention' },
        ];
        document.getElementById('kpi-row').innerHTML = tiles.map((t) =>
            `<button class="kpi-tile${t.cls}${statusFilter === t.key ? ' active' : ''}" data-filter="${t.key}">
                <div class="count">${t.count}</div><div class="label">${t.label}</div>
            </button>`
        ).join('');
    }

    document.getElementById('kpi-row').addEventListener('click', (e) => {
        const tile = e.target.closest('.kpi-tile');
        if (!tile) return;
        statusFilter = statusFilter === tile.dataset.filter ? null : tile.dataset.filter;
        renderKpiRow();
        renderStatusChips();
        renderView();
    });

    // --- ステータスチップ ---

    function renderStatusChips() {
        const chips = [['', 'すべて'], ...Object.entries(STATUS_LABELS)];
        document.getElementById('status-chips').innerHTML = chips.map(([key, label]) => {
            const isActive = key === '' ? statusFilter === null : statusFilter === key;
            return `<button class="chip${isActive ? ' active' : ''}" data-status="${key}">${label}</button>`;
        }).join('');
    }

    document.getElementById('status-chips').addEventListener('click', (e) => {
        const chip = e.target.closest('.chip');
        if (!chip) return;
        statusFilter = chip.dataset.status || null;
        renderKpiRow();
        renderStatusChips();
        renderView();
    });

    // --- 担当者・カテゴリフィルタ（どちらも事前登録済みリストを選択肢にする） ---

    function renderNamedFilterOptions(items, filterValue, allLabel, noneLabel) {
        return `<option value="">${allLabel}</option><option value="none"${filterValue === 'none' ? ' selected' : ''}>${noneLabel}</option>`
            + items.map((item) => `<option value="${escapeAttr(item.name)}"${filterValue === item.name ? ' selected' : ''}>${escapeHtml(item.name)}</option>`).join('');
    }

    function renderAssigneeFilter() {
        document.getElementById('assignee-filter').innerHTML =
            renderNamedFilterOptions(currentAssignees, assigneeFilter, '担当者: 全員', '未アサイン');
    }

    function renderCategoryFilter() {
        document.getElementById('category-filter').innerHTML =
            renderNamedFilterOptions(currentCategories, categoryFilter, 'カテゴリ: すべて', '未分類');
    }

    // --- タスクテーブル ---

    function visibleTasks() {
        const q = searchQuery.trim().toLowerCase();
        let tasks = currentTasks;
        if (statusFilter === 'attention') tasks = tasks.filter(isAttention);
        else if (statusFilter) tasks = tasks.filter(({ data }) => data.status === statusFilter);
        if (assigneeFilter === 'none') tasks = tasks.filter(({ data }) => !data.assigneeName);
        else if (assigneeFilter) tasks = tasks.filter(({ data }) => data.assigneeName === assigneeFilter);
        if (categoryFilter === 'none') tasks = tasks.filter(({ data }) => !data.category);
        else if (categoryFilter) tasks = tasks.filter(({ data }) => data.category === categoryFilter);
        if (q) tasks = tasks.filter(({ data }) => data.title.toLowerCase().includes(q) || (data.description || '').toLowerCase().includes(q));

        // 完了は末尾へ。未完了は期限が近い順（期限なしは後ろ）、完了は更新が新しい順
        return [...tasks].sort((a, b) => {
            const aDone = a.data.status === 'done' ? 1 : 0;
            const bDone = b.data.status === 'done' ? 1 : 0;
            if (aDone !== bDone) return aDone - bDone;
            if (aDone) {
                const aT = (a.data.updatedAt || a.data.createdAt)?.toMillis() || 0;
                const bT = (b.data.updatedAt || b.data.createdAt)?.toMillis() || 0;
                return bT - aT;
            }
            const aDue = a.data.dueDate ? a.data.dueDate.toMillis() : Infinity;
            const bDue = b.data.dueDate ? b.data.dueDate.toMillis() : Infinity;
            return aDue - bDue;
        });
    }

    function renderTable(tasks) {
        const tbody = document.getElementById('task-tbody');
        tbody.innerHTML = tasks.map(({ id, data }) => {
            const due = dueInfo(data);
            const descSnippet = (data.description || '').split('\n')[0];
            const statusOptions = Object.entries(STATUS_LABELS).map(([key, label]) =>
                `<option value="${key}"${key === data.status ? ' selected' : ''}>${label}</option>`).join('');
            return `<tr data-id="${id}" class="${data.status === 'done' ? 'row-done' : ''}">
                <td class="cell-title">
                    <span class="task-name">${escapeHtml(data.title)}</span>
                    ${data.category ? `<span class="badge badge-category">${escapeHtml(data.category)}</span>` : ''}
                    ${descSnippet ? `<span class="task-desc">${escapeHtml(descSnippet)}</span>` : ''}
                </td>
                <td class="cell-status">
                    <select class="status-select badge-${data.status}" data-id="${id}" title="ステータスを変更">${statusOptions}</select>
                </td>
                <td class="cell-assignee${data.assigneeName ? '' : ' unassigned'}">${escapeHtml(data.assigneeName || '未アサイン')}</td>
                <td class="cell-due"><span class="badge ${due.className}">${due.label}</span></td>
            </tr>`;
        }).join('');
    }

    // 行クリック→詳細モーダル／行内セレクト→ステータス即時変更
    document.getElementById('task-tbody').addEventListener('click', (e) => {
        if (e.target.closest('.status-select')) return; // セレクト操作は行クリック扱いにしない
        const row = e.target.closest('tr[data-id]');
        if (row) location.hash = `#/task/${row.dataset.id}`;
    });

    document.getElementById('task-tbody').addEventListener('change', (e) => {
        const select = e.target.closest('.status-select');
        if (!select || !currentUser) return;
        updateTaskStatus(select.dataset.id, select.value);
    });

    async function updateTaskStatus(id, status) {
        try {
            await updateDoc(doc(db, "tasks", id), { status, updatedAt: new Date() });
        } catch (error) {
            alert('ステータスの更新に失敗しました: ' + error.message);
        }
    }

    // --- カンバンボード ---

    function renderBoard(tasks) {
        const grouped = { todo: [], in_progress: [], done: [] };
        tasks.forEach((t) => grouped[t.data.status]?.push(t));

        Object.keys(STATUS_LABELS).forEach((statusKey) => {
            const body = document.querySelector(`.board-column-body[data-status="${statusKey}"]`);
            const countEl = document.querySelector(`.board-count[data-status="${statusKey}"]`);
            const list = grouped[statusKey];
            countEl.textContent = list.length;

            if (list.length === 0) {
                body.innerHTML = '<div class="board-empty">タスクなし</div>';
                return;
            }
            body.innerHTML = list.map(({ id, data }) => {
                const due = dueInfo(data);
                const statusOptions = Object.entries(STATUS_LABELS).map(([key, label]) =>
                    `<option value="${key}"${key === data.status ? ' selected' : ''}>${label}</option>`).join('');
                return `<div class="board-card" draggable="true" data-id="${id}">
                    <div class="board-card-title">${escapeHtml(data.title)}</div>
                    ${data.category ? `<div class="board-card-badges"><span class="badge badge-category">${escapeHtml(data.category)}</span></div>` : ''}
                    <div class="board-card-meta">
                        <span class="cell-assignee${data.assigneeName ? '' : ' unassigned'}">${escapeHtml(data.assigneeName || '未アサイン')}</span>
                        <span class="badge ${due.className}">${due.label}</span>
                    </div>
                    <select class="status-select badge-${data.status} board-card-select" data-id="${id}" title="ステータスを変更">${statusOptions}</select>
                </div>`;
            }).join('');
        });
    }

    // カードクリック→詳細モーダル／カード内セレクト→ステータス即時変更（スマホはD&D不可のため併設）
    document.getElementById('board-view').addEventListener('click', (e) => {
        if (e.target.closest('.status-select')) return;
        const card = e.target.closest('.board-card[data-id]');
        if (card) location.hash = `#/task/${card.dataset.id}`;
    });

    document.getElementById('board-view').addEventListener('change', (e) => {
        const select = e.target.closest('.status-select');
        if (!select || !currentUser) return;
        updateTaskStatus(select.dataset.id, select.value);
    });

    // カードのドラッグ&ドロップで列間移動→ステータス更新
    document.getElementById('board-view').addEventListener('dragstart', (e) => {
        const card = e.target.closest('.board-card[data-id]');
        if (!card) return;
        e.dataTransfer.setData('text/plain', card.dataset.id);
        e.dataTransfer.effectAllowed = 'move';
        card.classList.add('dragging');
    });
    document.getElementById('board-view').addEventListener('dragend', (e) => {
        const card = e.target.closest('.board-card[data-id]');
        if (card) card.classList.remove('dragging');
    });

    document.querySelectorAll('.board-column-body').forEach((body) => {
        body.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            body.classList.add('drag-over');
        });
        body.addEventListener('dragleave', () => body.classList.remove('drag-over'));
        body.addEventListener('drop', (e) => {
            e.preventDefault();
            body.classList.remove('drag-over');
            if (!currentUser) return;
            const taskId = e.dataTransfer.getData('text/plain');
            if (taskId) updateTaskStatus(taskId, body.dataset.status);
        });
    });

    // --- モーダル（詳細・編集・新規作成） ---

    // 表示中のフォームのidサフィックス。Firestoreスナップショットのたびに renderModal() が
    // 呼ばれるため、フォーム表示中に innerHTML を書き直すと入力中の内容が消える。
    // 同じフォームを表示し続ける間は担当者・カテゴリの選択肢だけを最新化する。
    let renderedFormSuffix = null;

    function renderModal() {
        const overlay = document.getElementById('modal-overlay');
        const card = document.getElementById('modal-card');

        const task = selectedTaskId ? currentTasks.find((t) => t.id === selectedTaskId) : null;
        const formSuffix = isCreating ? 'new'
            : isManagingCategories ? 'categories'
            : isManagingAssignees ? 'assignees'
            : (task && isEditingSelected ? task.id : null);

        if (formSuffix) {
            if (renderedFormSuffix === formSuffix) {
                if (formSuffix === 'categories') refreshManageList('category-manage-list', currentCategories, 'deleteCategory');
                else if (formSuffix === 'assignees') refreshManageList('assignee-manage-list', currentAssignees, 'deleteAssignee');
                else refreshTaskFormDynamicOptions(formSuffix);
            } else {
                card.innerHTML = isCreating ? renderTaskFormModal()
                    : isManagingCategories ? renderManageModal('カテゴリ管理', 'category-manage-list', currentCategories, 'deleteCategory', 'new-category-input', 'addCategory', '新しいカテゴリ名')
                    : isManagingAssignees ? renderManageModal('担当者管理', 'assignee-manage-list', currentAssignees, 'deleteAssignee', 'new-assignee-input', 'addAssignee', '新しい担当者名')
                    : renderTaskFormModal(task.id, task.data);
                renderedFormSuffix = formSuffix;
            }
            overlay.classList.remove('hidden');
            return;
        }
        renderedFormSuffix = null;

        if (!task) {
            overlay.classList.add('hidden');
            card.innerHTML = '';
            return;
        }

        card.innerHTML = renderTaskViewModal(task.id, task.data);
        overlay.classList.remove('hidden');
    }

    function refreshTaskFormDynamicOptions(idSuffix) {
        const assigneeSelect = document.getElementById(`task-assignee-${idSuffix}`);
        if (assigneeSelect) assigneeSelect.innerHTML = renderNamedSelectOptions(currentAssignees, assigneeSelect.value || null, '（未アサイン）');
        const categorySelect = document.getElementById(`task-category-${idSuffix}`);
        if (categorySelect) categorySelect.innerHTML = renderNamedSelectOptions(currentCategories, categorySelect.value || null, '（未分類）');
    }

    // --- カテゴリ管理・担当者管理モーダル（どちらも事前登録リストの追加・削除UIとして共通化） ---

    function renderManageListItems(items, deleteHandlerName) {
        if (items.length === 0) return '<p class="text-muted">まだ登録がありません。</p>';
        return items.map((item) =>
            `<div class="manage-row">
                <span>${escapeHtml(item.name)}</span>
                <button onclick="${deleteHandlerName}('${item.id}')" class="btn btn-danger btn-sm">削除</button>
            </div>`
        ).join('');
    }

    function refreshManageList(listId, items, deleteHandlerName) {
        const list = document.getElementById(listId);
        if (list) list.innerHTML = renderManageListItems(items, deleteHandlerName);
    }

    function renderManageModal(title, listId, items, deleteHandlerName, inputId, addHandlerName, placeholder) {
        return `
            <div class="modal-header">
                <h2>${title}</h2>
                <button class="modal-close" onclick="closeModal()" aria-label="閉じる">×</button>
            </div>
            <div id="${listId}" class="manage-list">${renderManageListItems(items, deleteHandlerName)}</div>
            <div class="manage-add">
                <input type="text" id="${inputId}" placeholder="${placeholder}">
                <button onclick="${addHandlerName}()" class="btn btn-primary btn-sm">追加</button>
            </div>
            <div class="form-actions">
                <button onclick="closeModal()" class="btn btn-ghost">閉じる</button>
            </div>
        `;
    }

    function renderTaskViewModal(id, data) {
        const due = dueInfo(data);
        return `
            <div class="modal-header">
                <h2>${escapeHtml(data.title)}</h2>
                <button class="modal-close" onclick="closeModal()" aria-label="閉じる">×</button>
            </div>
            <div class="task-badges">
                <span class="badge badge-${data.status}">${STATUS_LABELS[data.status]}</span>
                ${data.category ? `<span class="badge badge-category">${escapeHtml(data.category)}</span>` : ''}
                <span class="badge ${due.className}">${due.kind === 'none' ? '期限なし' : due.label}</span>
            </div>
            <div class="task-description">${escapeHtml(data.description || '（説明なし）')}</div>
            <div class="task-meta">
                <span>担当者: <strong>${escapeHtml(data.assigneeName || '未アサイン')}</strong></span>
                <span>作成者: ${escapeHtml(data.creatorName || '不明')} | ${data.createdAt?.toDate().toLocaleString() || ''}</span>
                ${data.updatedAt ? `<span>最終更新: ${data.updatedAt.toDate().toLocaleString()}</span>` : ''}
            </div>
            <div class="task-actions">
                <button onclick="deleteTask('${id}')" class="btn btn-danger btn-sm">削除する</button>
                <button onclick="startEdit('${id}')" class="btn btn-ghost btn-sm">編集する</button>
            </div>
        `;
    }

    function renderNamedSelectOptions(items, selectedName, emptyLabel) {
        const options = items.map((item) =>
            `<option value="${escapeAttr(item.name)}"${item.name === selectedName ? ' selected' : ''}>${escapeHtml(item.name)}</option>`);
        return `<option value=""${!selectedName ? ' selected' : ''}>${emptyLabel}</option>` + options.join('');
    }

    function renderStatusSelectOptions(selectedStatus) {
        return Object.entries(STATUS_LABELS).map(([key, label]) =>
            `<option value="${key}"${key === selectedStatus ? ' selected' : ''}>${label}</option>`
        ).join('');
    }

    function toDateInputValue(dueDate) {
        if (!dueDate) return '';
        const d = dueDate.toDate();
        const pad = (n) => String(n).padStart(2, '0');
        return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
    }

    function renderTaskFormModal(id, data) {
        const isEdit = Boolean(id);
        const idSuffix = isEdit ? id : 'new';
        const title = isEdit ? data.title : '';
        const category = isEdit ? (data.category || '') : '';
        const description = isEdit ? (data.description || '') : '';
        const status = isEdit ? data.status : 'todo';
        const assigneeName = isEdit ? (data.assigneeName || '') : '';
        const dueValue = isEdit ? toDateInputValue(data.dueDate) : '';
        const onCancelAttr = isEdit ? 'cancelEdit()' : 'closeModal()';
        const onSaveAttr = isEdit ? `saveEdit('${id}')` : 'submitNewTask()';
        const submitLabel = isEdit ? '保存する' : '作成する';

        return `
            <div class="modal-header">
                <h2>${isEdit ? 'タスクを編集' : '新規タスクを作成'}</h2>
                <button class="modal-close" onclick="closeModal()" aria-label="閉じる">×</button>
            </div>
            <div class="task-form">
                <label class="field-label" for="task-title-${idSuffix}">タイトル</label>
                <input type="text" id="task-title-${idSuffix}" value="${escapeAttr(title)}" placeholder="例：合宿の宿を予約する">

                <label class="field-label" for="task-category-${idSuffix}">カテゴリ</label>
                <select id="task-category-${idSuffix}">${renderNamedSelectOptions(currentCategories, category, '（未分類）')}</select>

                <label class="field-label" for="task-description-${idSuffix}">説明</label>
                <textarea id="task-description-${idSuffix}" placeholder="補足やメモ（任意）">${escapeHtml(description)}</textarea>

                <div class="form-row">
                    <div>
                        <label class="field-label" for="task-status-${idSuffix}">ステータス</label>
                        <select id="task-status-${idSuffix}">${renderStatusSelectOptions(status)}</select>
                    </div>
                    <div>
                        <label class="field-label" for="task-assignee-${idSuffix}">担当者</label>
                        <select id="task-assignee-${idSuffix}">${renderNamedSelectOptions(currentAssignees, assigneeName, '（未アサイン）')}</select>
                    </div>
                </div>

                <label class="field-label" for="task-due-${idSuffix}">期限</label>
                <input type="date" id="task-due-${idSuffix}" value="${dueValue}">

                <div class="form-actions">
                    <button onclick="${onCancelAttr}" class="btn btn-ghost">キャンセル</button>
                    <button onclick="${onSaveAttr}" class="btn btn-primary">${submitLabel}</button>
                </div>
            </div>
        `;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function escapeAttr(text) {
        return escapeHtml(text || '').replace(/"/g, '&quot;');
    }

    function readTaskFormValues(idSuffix) {
        const title = document.getElementById(`task-title-${idSuffix}`).value.trim();
        const category = document.getElementById(`task-category-${idSuffix}`).value.trim() || null;
        const description = document.getElementById(`task-description-${idSuffix}`).value;
        const status = document.getElementById(`task-status-${idSuffix}`).value;
        const assigneeName = document.getElementById(`task-assignee-${idSuffix}`).value.trim() || null;
        const dueRaw = document.getElementById(`task-due-${idSuffix}`).value;
        const dueDate = dueRaw ? new Date(`${dueRaw}T00:00:00`) : null;
        return { title, category, description, status, assigneeName, dueDate };
    }

    // --- タスクの作成・編集・削除（グループ共同編集：ログイン済みなら誰でも編集・削除・ステータス変更可） ---

    window.submitNewTask = async () => {
        const values = readTaskFormValues('new');
        if (!values.title || !currentUser) return;

        try {
            const docRef = await addDoc(collection(db, "tasks"), {
                ...values,
                creatorUid: currentUser.uid,
                creatorName: currentUser.displayName,
                createdAt: new Date()
            });
            location.hash = `#/task/${docRef.id}`;
        } catch (error) {
            alert('タスクの作成に失敗しました: ' + error.message);
        }
    };

    window.startEdit = (id) => {
        if (!currentUser) return;
        isEditingSelected = true;
        renderModal();
    };

    window.cancelEdit = () => {
        isEditingSelected = false;
        renderModal();
    };

    window.saveEdit = async (id) => {
        if (!currentUser) return;
        const values = readTaskFormValues(id);
        if (!values.title) return;

        try {
            await updateDoc(doc(db, "tasks", id), { ...values, updatedAt: new Date() });
            isEditingSelected = false;
            renderModal();
        } catch (error) {
            alert('タスクの更新に失敗しました: ' + error.message);
        }
    };

    window.deleteTask = async (id) => {
        if (!currentUser) return;
        if (!confirm('このタスクを削除しますか？')) return;

        try {
            await deleteDoc(doc(db, "tasks", id));
            if (selectedTaskId === id) location.hash = '';
        } catch (error) {
            alert('タスクの削除に失敗しました: ' + error.message);
        }
    };
</script>
</body>
</html>
